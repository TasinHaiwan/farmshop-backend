<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FarmShop{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Petit+Formal+Script&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest:    #2D6A4F;
      --moss:      #52B788;
      --sage:      #95D5B2;
      --cream:     #F8F4EE;
      --parchment: #EDE8DF;
      --earth:     #8B5E3C;
      --amber:     #D4A017;
      --rust:      #C45C26;
      --ink:       #1A2318;
      --mist:      #B7C9BB;
      --r-card:    16px;
      --r-pill:    999px;
      --shadow:    0 4px 24px rgba(45,106,79,.13);
      --shadow-h:  0 12px 40px rgba(45,106,79,.22);
      --max-w:     1200px;
      --px:        clamp(1.5rem, 5vw, 4rem);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .6;
    }
    /* Nav */
    .site-header {
      position: relative; z-index: 100;
      background: var(--forest);
      padding: 0 var(--px);
    }
    .site-header::after {
      content: ''; position: absolute;
      width: 320px; height: 320px;
      background: var(--moss);
      border-radius: 50% 0 50% 0;
      top: -120px; right: -50px;
      opacity: .1; pointer-events: none;
    }
    .nav-inner {
      position: relative; z-index: 1;
      max-width: var(--max-w); margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
    }
    .logo { display: flex; align-items: center; gap: .65rem; text-decoration: none; }
    .logo-icon {
      width: 38px; height: 38px; background: var(--moss);
      border-radius: 10px; display: grid; place-items: center; font-size: 1.2rem;
    }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #fff; }
    .logo-text em { color: var(--sage); font-style: italic; }
    nav { display: flex; gap: 1.75rem; align-items: center; }
    nav a {
      color: rgba(255,255,255,.6); text-decoration: none;
      font-size: .875rem; font-weight: 500; letter-spacing: .02em;
      transition: color .18s; padding: .3rem 0;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: var(--sage); border-bottom-color: var(--sage); }
    nav a.admin-link {
      background: rgba(255,255,255,.1); color: rgba(255,255,255,.7);
      padding: .35rem .9rem; border-radius: var(--r-pill); border: none; font-size: .8rem;
    }
    nav a.admin-link:hover { background: rgba(255,255,255,.18); color: #fff; }
    /* Page hero */
    .page-hero {
      background: var(--forest);
      padding: 2.5rem var(--px) 3rem;
      position: relative; overflow: hidden; z-index: 1;
    }
    .page-hero-inner { max-width: var(--max-w); margin: 0 auto; }
    .page-hero .script {
      font-family: 'Petit Formal Script', cursive;
      color: var(--sage); font-size: 1rem;
      display: block; margin-bottom: .3rem;
      opacity: 0; animation: fadeUp .5s .1s forwards;
    }
    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 4vw, 3rem);
      color: #fff; line-height: 1.15;
      opacity: 0; animation: fadeUp .5s .2s forwards;
    }
    .page-hero h1 em { color: var(--sage); font-style: italic; }
    .page-hero p {
      color: rgba(255,255,255,.55); font-size: .95rem; margin-top: .6rem;
      max-width: 460px; line-height: 1.6;
      opacity: 0; animation: fadeUp .5s .3s forwards;
    }
    /* Breadcrumb */
    .breadcrumb {
      max-width: var(--max-w); margin: 1.5rem auto .25rem;
      padding: 0 var(--px);
      display: flex; align-items: center; gap: .5rem;
      font-size: .8rem; color: var(--mist);
      position: relative; z-index: 1;
    }
    .breadcrumb a { color: var(--forest); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    /* Main */
    .page-main {
      position: relative; z-index: 1;
      max-width: var(--max-w); margin: 0 auto;
      padding: 0 var(--px) 5rem;
    }
    /* Labels */
    .section-label {
      font-size: .72rem; font-weight: 500;
      letter-spacing: .13em; text-transform: uppercase;
      color: var(--mist); margin-bottom: 1.25rem;
    }
    /* Pills */
    .pill {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .28rem .75rem; border-radius: var(--r-pill);
      font-size: .75rem; font-weight: 600; letter-spacing: .04em;
    }
    .pill-green  { background: rgba(45,106,79,.1);  color: var(--forest); }
    .pill-amber  { background: rgba(212,160,23,.12); color: #a87c00; }
    .pill-mist   { background: var(--parchment);     color: var(--earth); }
    .pill-open   { background: rgba(82,183,136,.18); color: #1d7a50; }
    .pill-closed { background: rgba(0,0,0,.07);      color: #888; }
    /* Star */
    .star-rating {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .82rem; font-weight: 600; color: var(--amber);
    }
    .star-rating small { color: var(--mist); font-weight: 400; font-size: .75rem; }
    /* Footer */
    .site-footer {
      background: var(--ink); color: rgba(255,255,255,.35);
      text-align: center; padding: 1.75rem; font-size: .8rem;
      position: relative; z-index: 1;
    }
    .site-footer span { color: var(--moss); }
    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { opacity: 0; animation: fadeUp .5s forwards; }
    /* Spinner */
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--parchment); border-top-color: var(--forest);
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap { text-align: center; padding: 4rem; }
    /* Empty */
    .empty-state { text-align: center; padding: 5rem 2rem; color: var(--mist); }
    .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
    @media (max-width: 640px) { nav .hide-mob { display: none; } }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<header class="site-header">
  <div class="nav-inner">
    <a href="/shops/browse/" class="logo">
      <div class="logo-icon">🌿</div>
      <span class="logo-text">Farm<em>Shop</em></span>
    </a>
    <nav>
      <a href="/shops/browse/"     class="{% block nav_shops %}{% endblock %}">Shops</a>
      <a href="/items/browse/"     class="{% block nav_items %}{% endblock %} hide-mob">Products</a>
      <a href="/categories/browse/" class="{% block nav_cats %}{% endblock %} hide-mob">Categories</a>
      <a href="/admin/" class="admin-link">Admin ↗</a>
    </nav>
  </div>
</header>

{% block content %}{% endblock %}

<footer class="site-footer">
  © 2025 <span>FarmShop</span> · Powered by Django REST Framework
</footer>

{% block extra_scripts %}{% endblock %}
</body>
</html>
